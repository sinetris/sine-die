---
defaultContentLanguage: en

module:
  hugoVersion:
    extended: true
    min: "0.146.0"

outputs:
  home:
    - html
    - rss
  page:
    - html
  sections:
    - html
    - rss
  taxonomy:
    - html
    - rss
  term:
    - html
    - rss

markup:
  highlight:
    style: catppuccin-latte
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2
  goldmark:
    parser:
      attribute:
        block: true
        title: true
    renderer:
      unsafe: true

params:
  theme: sine-die
  themeLink: 'https://sinetris.github.io/sine-die/'

  # Favicons (check README.md)
  enableFavicons: false

  # Search UI
  showSearchUI: false

  # Author
  author: Duilio Ruggiero
  authorLink: 'https://sinetris.info'

  # License
  license: MIT
  licenselink: 'https://github.com/sinetris/sine-die/blob/main/LICENSE'
  showLicenseInFooter: true

  # Copyright
  copyrightStartYear: '2023'
